name: Terraform Multi-Scanner Security Pipeline

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  terraform-security:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          quiet: true
          soft_fail: true

      - name: Run KICS Scan
        uses: checkmarx/kics-github-action@v2.1.9
        with:
          path: terraform
          fail_on: high,medium
          output_path: results-kics
          output_formats: sarif

      - name: Upload KICS SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results-kics/results.sarif

      - name: Setup Regula
        run: |
          curl -L -o regula.tar.gz https://github.com/fugue/regula/releases/latest/download/regula_Linux_x86_64.tar.gz
          tar -xzf regula.tar.gz
          chmod +x regula
          sudo mv regula /usr/local/bin/regula

      - name: Run Regula
        working-directory: .
        run: regula run terraform