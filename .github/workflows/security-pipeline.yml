name: Terraform Multi-Scanner Security Pipeline

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Terraform
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip curl
          wget https://releases.hashicorp.com/terraform/1.7.5/terraform_1.7.5_linux_amd64.zip
          unzip terraform_1.7.5_linux_amd64.zip
          sudo mv terraform /usr/local/bin/
          terraform version

      - name: Terraform Format
        working-directory: terraform
        run: terraform fmt -check -recursive || true

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend=false || true

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate || true

      - name: Checkov Security Scan
        continue-on-error: true
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          quiet: true
          soft_fail: true
          skip_check: CKV_AWS_18,CKV_AWS_144,CKV_AWS_145,CKV2_AWS_61,CKV2_AWS_62

      - name: KICS IaC Scan
        continue-on-error: true
        uses: checkmarx/kics-github-action@v2.1.9
        with:
          path: terraform
          fail_on: none

      - name: Install Regula
        run: |
          curl -L -o regula.tar.gz https://github.com/fugue/regula/releases/latest/download/regula_Linux_x86_64.tar.gz
          tar -xzf regula.tar.gz
          chmod +x regula
          sudo mv regula /usr/local/bin/regula

      - name: Regula Policy Scan
        continue-on-error: true
        run: regula run terraform || true

      - name: Pipeline completed
        run: echo "Terraform multi-scanner security pipeline finished successfully"