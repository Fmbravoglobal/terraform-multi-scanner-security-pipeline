name: Terraform Multi-Scanner Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Terraform
        run: |
          sudo apt-get update || true
          sudo apt-get install -y wget unzip curl python3-pip docker.io || true
          wget -q https://releases.hashicorp.com/terraform/1.7.5/terraform_1.7.5_linux_amd64.zip || true
          unzip -o terraform_1.7.5_linux_amd64.zip || true
          sudo mv terraform /usr/local/bin/ || true
          terraform version || true

      - name: Terraform Format
        run: |
          cd terraform
          terraform fmt -check -recursive || true

      - name: Terraform Init
        run: |
          cd terraform
          terraform init -backend=false || true

      - name: Terraform Validate
        run: |
          cd terraform
          terraform validate || true

      - name: Install Checkov
        run: |
          pip3 install checkov || true

      - name: Run Checkov
        run: |
          checkov -d terraform --quiet || true

      - name: Run KICS
        run: |
          docker pull checkmarx/kics:latest || true
          docker run --rm -v "${{ github.workspace }}/terraform:/path" checkmarx/kics:latest scan -p /path || true

      - name: Install Regula
        run: |
          curl -L -o regula.tar.gz https://github.com/fugue/regula/releases/latest/download/regula_Linux_x86_64.tar.gz || true
          tar -xzf regula.tar.gz || true
          chmod +x regula || true
          sudo mv regula /usr/local/bin/regula || true

      - name: Run Regula
        run: |
          regula run terraform || true

      - name: Finish pipeline
        run: echo "Pipeline finished"